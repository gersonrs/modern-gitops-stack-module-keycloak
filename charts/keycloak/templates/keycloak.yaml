---
apiVersion: k8s.keycloak.org/v2alpha1
kind: Keycloak
metadata:
  name: keycloak
  labels:
    {{- include "modern-gitops-stack-module-keycloak.labels" $ | indent 4 }}
spec:
  instances: 1
  db:
    vendor: postgres
    host: {{ .Values.keycloak.database.host }}
    usernameSecret:
      name: {{ .Values.keycloak.database.existingSecret | default "keycloak-db-secret" }}
      key: username
    passwordSecret:
      name: {{ .Values.keycloak.database.existingSecret | default "keycloak-db-secret" }}
      key: password
  http:
    httpEnabled: true
  hostname:
    hostname: {{ .Values.keycloak.httproute.host | quote }}
  ingress:
    enabled: false
  proxy:
    headers: xforwarded
  serviceMonitor:
    enabled: {{ .Values.keycloak.serviceMonitor.enabled | default false }}
    interval: 10s
    scrapeTimeout: 5s
  networkPolicy:
    enabled: false
  {{- if .Values.keycloak.theme.enabled }}
  additionalOptions:
    - name: spi-theme-login-default
      value: {{ .Values.keycloak.theme.name | default "modern-gitops" | quote }}
  unsupported:
    podTemplate:
      spec:
        initContainers:
          - name: git-clone-theme
            image: {{ .Values.keycloak.theme.initContainer.image | default "alpine/git" }}
            securityContext:
              runAsUser: 1000
              runAsGroup: 1000
              runAsNonRoot: true
            command:
              - /bin/sh
              - -c
            args:
              - >-
                cd /tmp &&
                git clone --branch={{ .Values.keycloak.theme.repository.branch | default "main" }} {{ .Values.keycloak.theme.repository.url }} keycloak-theme &&
                cp -r keycloak-theme/{{ .Values.keycloak.theme.repository.path | default "themes" }}/* /theme
            volumeMounts:
              - name: theme-volume
                mountPath: /theme
        containers:
          - name: keycloak
            volumeMounts:
              - name: theme-volume
                mountPath: /opt/keycloak/themes/{{ .Values.keycloak.theme.name | default "modern-gitops" }}
        volumes:
          - name: theme-volume
            emptyDir: {}
  {{- end }}